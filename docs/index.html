<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CreatorBook</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="assets/style.css?v=1">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<header class="top">
<div class="logo">CREATORBOOK</div>
<nav>
<button data-page="home">Home</button>
<button data-page="book">Book</button>
<button data-page="projects">Projects</button>
<button id="loginBtn">Sign In</button>
<button id="logoutBtn" class="hidden">Sign Out</button>
</nav>
</header>

<main id="app"></main>

<div id="authModal" class="modal hidden">
<div class="modalBox">
<h2>Sign In</h2>
<input id="email" placeholder="email">
<input id="pass" type="password" placeholder="password">
<button id="doLogin">Login</button>
<button id="doSignup">Create Account</button>
</div>
</div>

<script src="config.js"></script>
<script src="assets/app.js?v=1"></script>
</body>
</html>
